# GitHub Actions Workflow for Deploying Community Arctic Map to Google Cloud Run
name: 🚀 Deploy to Google Cloud Run

on:
  # Manual trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
          - staging
        default: 'staging'
      skip_tests:
        description: 'Skip validation tests'
        required: false
        type: boolean
        default: false

# Environment variables used across all jobs
env:
  GCP_REGION: us-east1-docker.pkg.dev
  region: us-east1
  ARTIFACT_REGISTRY_REPO: arctic-map-repo
  SERVICE_NAME: community-arctic-map
  gcp_project_id: salap-ayca-artic-map
  gcp_registry_url: us-east1-docker.pkg.dev
  gcp_container_registry: arctic-map-repo
  image: community-arctic-map
  

jobs:
  # =============================================================================
  # Phase 1: PREPARE - Validation, setup, authentication
  # =============================================================================
  prepare:
    name: 🔍 Prepare and Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    outputs:
      project_id: ${{ steps.setup.outputs.project_id }}
      image_tag: ${{ steps.setup.outputs.image_tag }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 🔧 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install backend dependencies
        if: ${{ !inputs.skip_tests }}
        run: |
          cd backend
          pip install -r requirements.txt
        timeout-minutes: 5

      - name: 📦 Install frontend dependencies
        if: ${{ !inputs.skip_tests }}
        run: |
          cd frontend
          npm ci
        timeout-minutes: 5

      - name: 🧪 Lint frontend code
        if: ${{ !inputs.skip_tests }}
        run: |
          cd frontend
          npm run lint || echo "⚠️ Linting warnings detected"
        continue-on-error: true

      - name: 📊 Setup deployment metadata
        id: setup
        run: |
          echo "project_id=${{ env.gcp_project_id }}" >> $GITHUB_OUTPUT
          echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "✅ Prepare phase completed successfully"

      - name: 🔐 Validate required secrets
        run: |
          echo "Checking required secrets..."
          
          if [ -z "${{ env.gcp_project_id }}" ]; then
            echo "❌ gcp_project_id secret is missing"
            exit 1
          fi
          
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "❌ GCP_SERVICE_ACCOUNT_KEY secret is missing"
            exit 1
          fi
          
          if [ -z "${{ secrets.GOOGLE_SHEET_ID }}" ]; then
            echo "⚠️ GOOGLE_SHEET_ID secret is missing (optional)"
          fi
          
          if [ -z "${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}" ]; then
            echo "⚠️ VITE_MAPBOX_ACCESS_TOKEN secret is missing (optional)"
          fi
          
          echo "✅ Required secrets validation completed"

  # =============================================================================
  # Phase 2: DEPLOY - Build and deploy to Cloud Run
  # =============================================================================
  deploy:
    name: 🚀 Build and Deploy
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 30
    environment: ${{ inputs.environment || 'staging' }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: 🔧 Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.gcp_project_id }}

      - uses: docker/login-action@v3
        with:
            registry: ${{ env.GCP_REGION }}
            username: _json_key
            password: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      
      - name: Configure Docker Auth
        shell: bash
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.gcp_registry_url }}/${{ env.gcp_project_id }}/${{ env.gcp_container_registry }}/${{ env.image }}:latest
          build-args: |
            VITE_MAPBOX_ACCESS_TOKEN=${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}
            GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
            GOOGLE_SHEET_GID=${{ secrets.GOOGLE_SHEET_GID }}

      - name: 🚀 Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v2'
        id: "deploy"
        with:
          service: ${{ env.image }}
          region: ${{ env.region }}
          project_id: ${{ env.gcp_project_id }}
          image: ${{ env.gcp_registry_url }}/${{ env.gcp_project_id }}/${{ env.gcp_container_registry }}/${{ env.image }}:latest
          env_vars: |-
            PORT=8080
            GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
            GOOGLE_SHEET_GID=${{ secrets.GOOGLE_SHEET_GID }}
          flags: >-
              --allow-unauthenticated
              --service-account=${{ env.SERVICE_NAME }}-sa@${{ env.gcp_project_id }}.iam.gserviceaccount.com

      - name: 🔍 Get service URL
        id: get-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.region }} \
            --format='value(status.url)')
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "🌐 Service URL: $SERVICE_URL"

      - name: ✅ Verify deployment
        run: |
          echo "Waiting for service to be ready..."
          sleep 10
          
          SERVICE_URL="${{ steps.get-url.outputs.service_url }}"
          
          # Test health endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/api/layer_hierarchy" || echo "000")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Service is responding correctly (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Service returned HTTP $HTTP_CODE"
            echo "Please check the logs: gcloud run logs read ${{ env.SERVICE_NAME }} --region=${{ env.region }}"
          fi

      - name: 📝 Deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ needs.prepare.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** ${{ steps.get-url.outputs.service_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Visit the service URL to verify the deployment" >> $GITHUB_STEP_SUMMARY
          echo "2. Upload the cpad.sqlite file to Cloud Storage" >> $GITHUB_STEP_SUMMARY
          echo "3. Update the Cloud Run service to mount the database" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Phase 3: TEARDOWN - Cleanup and rollback if needed
  # =============================================================================
  teardown:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: 📊 Log deployment status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment completed successfully"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "❌ Deployment failed"
            echo "Check the deploy job logs for details"
          elif [ "${{ needs.deploy.result }}" = "cancelled" ]; then
            echo "⚠️ Deployment was cancelled"
          fi

      - name: 🔐 Authenticate to Google Cloud
        if: needs.deploy.result == 'failure'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: 🔧 Setup Cloud SDK
        if: needs.deploy.result == 'failure'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.gcp_project_id }}

      - name: 🔄 Rollback on failure (optional)
        if: needs.deploy.result == 'failure'
        run: |
          echo "⚠️ Deployment failed. Consider manual rollback if needed."
          echo "To rollback, run:"
          echo "gcloud run services update-traffic ${{ env.SERVICE_NAME }} --to-revisions=PREVIOUS_REVISION=100 --region=${{ env.region }}"
