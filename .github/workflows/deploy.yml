# GitHub Actions Workflow for Deploying Community Arctic Map to Google Cloud Run
name: 🚀 Deploy to Google Cloud Run

on: workflow_dispatch

# Permissions needed for the workflow
permissions:
  contents: read
  id-token: write
  actions: read

# Environment variables used across all jobs
env:
  GCP_PROJECT_ID: salap-ayca-artic-map
  GCP_REGION: us-east1
  REGISTRY_URL: us-east1-docker.pkg.dev
  ARTIFACT_REGISTRY_REPO: arctic-map-repo
  SERVICE_NAME: community-arctic-map
  IMAGE_NAME: community-arctic-map

jobs:
  # =============================================================================
  # Phase 1: PREPARE - Validation, setup, authentication
  # =============================================================================
  prepare:
    name: 🔍 Prepare and Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    outputs:
      project_id: ${{ steps.setup.outputs.project_id }}
      image_tag: ${{ steps.setup.outputs.image_tag }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 🔧 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
        timeout-minutes: 5

      - name: 📦 Install frontend dependencies
        run: |
          cd frontend
          npm ci
        timeout-minutes: 5

      - name: 🧪 Lint frontend code
        run: |
          cd frontend
          npm run lint || echo "⚠️ Linting warnings detected"
        continue-on-error: true

      - name: 📊 Setup deployment metadata
        id: setup
        run: |
          echo "project_id=${{ env.GCP_PROJECT_ID }}" >> $GITHUB_OUTPUT
          echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "✅ Prepare phase completed successfully"

      - name: 🔐 Validate required secrets
        run: |
          echo "Checking required secrets..."
          
          if [ -z "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "❌ GCP_PROJECT_ID secret is missing"
            exit 1
          fi
          
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "❌ GCP_SERVICE_ACCOUNT_KEY secret is missing"
            exit 1
          fi
          
          if [ -z "${{ secrets.GOOGLE_SHEET_ID }}" ]; then
            echo "⚠️ GOOGLE_SHEET_ID secret is missing (optional)"
          fi
          
          if [ -z "${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}" ]; then
            echo "⚠️ VITE_MAPBOX_ACCESS_TOKEN secret is missing (optional)"
          fi
          
          echo "✅ Required secrets validation completed"

  # =============================================================================
  # Phase 2: DEPLOY - Build and deploy to Cloud Run
  # =============================================================================
  deploy:
    name: 🚀 Build and Deploy
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: 🔧 Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - uses: docker/login-action@v3
        with:
            registry: ${{ env.REGISTRY_URL }}
            username: _json_key
            password: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      
      - name: Configure Docker Auth
        shell: bash
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY_URL }}

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VITE_MAPBOX_ACCESS_TOKEN=${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}

      - name: 🚀 Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v2'
        id: "deploy"
        with:
          service: ${{ env.IMAGE_NAME }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          image: ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest
          env_vars: |-
            GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
            GOOGLE_SHEET_GID=${{ secrets.GOOGLE_SHEET_GID }}
          flags: >-
              --allow-unauthenticated
              --service-account=${{ env.SERVICE_NAME }}-sa@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
              --timeout=300
              --cpu-boost
              --cpu=2
              --memory=2Gi
              --clear-volumes
              --clear-volume-mounts
              --add-volume=name=database,type=cloud-storage,bucket=${{ env.GCP_PROJECT_ID }}-community-arctic-map-data
              --add-volume-mount=volume=database,mount-path=/app/database

      - name: 🔍 Get service URL
        id: get-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "🌐 Service URL: $SERVICE_URL"

      - name: ✅ Verify deployment
        run: |
          echo "Waiting for service to be ready..."
          SERVICE_URL="${{ steps.get-url.outputs.service_url }}"
          
          # Test health endpoint with retries
          MAX_RETRIES=10
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Service is responding correctly (HTTP $HTTP_CODE)"
              SUCCESS=true
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES - Service returned HTTP $HTTP_CODE"
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                sleep 10
              fi
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ Service failed to respond after $MAX_RETRIES attempts"
            echo "Please check the logs: gcloud run logs read ${{ env.SERVICE_NAME }} --region=${{ env.GCP_REGION }}"
            exit 1
          fi

      - name: 📝 Deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ needs.prepare.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** ${{ steps.get-url.outputs.service_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Visit the service URL to verify the deployment" >> $GITHUB_STEP_SUMMARY
          echo "2. Ensure cpad.sqlite is uploaded to Cloud Storage bucket" >> $GITHUB_STEP_SUMMARY
          echo "   \`gsutil cp backend/cpad.sqlite gs://${{ env.GCP_PROJECT_ID }}-community-arctic-map-data/cpad.sqlite\`" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Phase 3: TEARDOWN - Cleanup and rollback if needed
  # =============================================================================
  teardown:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: 📊 Log deployment status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment completed successfully"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "❌ Deployment failed"
            echo "Check the deploy job logs for details"
          elif [ "${{ needs.deploy.result }}" = "cancelled" ]; then
            echo "⚠️ Deployment was cancelled"
          fi

      - name: 🔐 Authenticate to Google Cloud
        if: needs.deploy.result == 'failure'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: 🔧 Setup Cloud SDK
        if: needs.deploy.result == 'failure'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: 🔄 Rollback on failure (optional)
        if: needs.deploy.result == 'failure'
        run: |
          echo "⚠️ Deployment failed. Consider manual rollback if needed."
          echo "To rollback, run:"
          echo "gcloud run services update-traffic ${{ env.SERVICE_NAME }} --to-revisions=PREVIOUS_REVISION=100 --region=${{ env.GCP_REGION }}"
